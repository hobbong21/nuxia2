services:
  postgres:
    image: postgres:16-alpine
    container_name: nuxia2-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nuxia2}
      POSTGRES_USER: ${POSTGRES_USER:-nuxia2}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nuxia2_dev}
    volumes:
      - nuxia2_pg_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: nuxia2-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - nuxia2_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Optional dev profiles - run with `docker compose --profile full up`
  api:
    profiles: ["full"]
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: nuxia2-api
    # env_file is optional (local overrides); explicit env below is authoritative for compose networking.
    env_file:
      - path: ./apps/api/.env.local
        required: false
    environment:
      NODE_ENV: production
      PORT: "4000"
      DATABASE_URL: postgresql://${POSTGRES_USER:-nuxia2}:${POSTGRES_PASSWORD:-nuxia2_dev}@postgres:5432/${POSTGRES_DB:-nuxia2}?schema=public
      REDIS_URL: redis://redis:6379
      ADMIN_API_KEY: ${ADMIN_API_KEY:-dev_admin_api_key}
      METRICS_INTERNAL_SECRET: ${METRICS_INTERNAL_SECRET:-dev_metrics_secret}
      TOTP_ISSUER: ${TOTP_ISSUER:-Nuxia2-Dev}
      OTP_DRY_RUN: ${OTP_DRY_RUN:-1}
      ADMIN_REQUIRE_2FA: ${ADMIN_REQUIRE_2FA:-false}
      SMS_PROVIDER: ${SMS_PROVIDER:-solapi}
      SMS_API_KEY: ${SMS_API_KEY:-}
      SMS_API_SECRET: ${SMS_API_SECRET:-}
      SMS_FROM_NUMBER: ${SMS_FROM_NUMBER:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-no-reply@nuxia2.kr}
      METRICS_LOG_WIRING: ${METRICS_LOG_WIRING:-0}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    ports:
      - "4000:4000"

  web:
    profiles: ["full"]
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: nuxia2-web
    env_file:
      - path: ./apps/web/.env.local
        required: false
    environment:
      NODE_ENV: production
      PORT: "3000"
      # Note: NEXT_PUBLIC_* must be available at build time for baked-in values.
      # This var supports server-side fetches at runtime within the compose network.
      NEXT_PUBLIC_API_BASE_URL: http://api:4000
      NEXT_PUBLIC_USE_MOCK: ${NEXT_PUBLIC_USE_MOCK:-0}
    depends_on:
      api: { condition: service_started }
    ports:
      - "3000:3000"

volumes:
  nuxia2_pg_data:
  nuxia2_redis_data:
