services:
  postgres:
    image: postgres:16-alpine
    container_name: nuxia2-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nuxia2}
      POSTGRES_USER: ${POSTGRES_USER:-nuxia2}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nuxia2_dev}
    volumes:
      - nuxia2_pg_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: nuxia2-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - nuxia2_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Optional dev profiles - run with `docker compose --profile full up`
  api:
    profiles: ["full"]
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: nuxia2-api
    env_file: [./apps/api/.env.local]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    ports:
      - "4000:4000"

  web:
    profiles: ["full"]
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: nuxia2-web
    env_file: [./apps/web/.env.local]
    depends_on:
      api: { condition: service_started }
    ports:
      - "3000:3000"

volumes:
  nuxia2_pg_data:
  nuxia2_redis_data:
